<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS SAA-C03 Exam Simulator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap');

  :root {
    --bg:        #0a0e1a;
    --surface:   #111827;
    --surface2:  #1a2236;
    --border:    #1e2d47;
    --border2:   #2a3f5f;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --amber:     #f59e0b;
    --amber2:    #fbbf24;
    --blue:      #3b82f6;
    --blue2:     #60a5fa;
    --green:     #10b981;
    --red:       #ef4444;
    --orange:    #f97316;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Top Nav ── */
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.875rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 0.75rem;
    font-family: var(--mono); font-size: 1rem; font-weight: 600;
    color: var(--amber);
    letter-spacing: 0.05em;
  }
  .nav-logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--amber), #ff8c00);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 700; color: #000;
  }
  .nav-links { display: flex; gap: 0.5rem; }
  .nav-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; padding: 0.375rem 0.875rem;
    border-radius: 6px; font-family: var(--sans); font-size: 0.8125rem;
    transition: all 0.15s;
  }
  .nav-btn:hover, .nav-btn.active {
    border-color: var(--amber); color: var(--amber2); background: rgba(245,158,11,0.06);
  }

  /* ── Main Layout ── */
  .main { flex: 1; padding: 2rem; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* ── Home / Setup Screen ── */
  .home-hero {
    text-align: center; padding: 3rem 0 2rem;
  }
  .home-hero h1 {
    font-size: 2.5rem; font-weight: 700; color: var(--text);
    line-height: 1.2; margin-bottom: 0.75rem;
  }
  .home-hero h1 span { color: var(--amber); }
  .home-hero p { color: var(--muted); font-size: 1rem; max-width: 520px; margin: 0 auto; }

  .setup-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 2.5rem;
  }
  @media (max-width: 640px) { .setup-grid { grid-template-columns: 1fr; } }

  .setup-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem;
  }
  .setup-card h3 {
    font-size: 0.8rem; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--amber); margin-bottom: 1rem;
  }

  .field-label { font-size: 0.8125rem; color: var(--muted); margin-bottom: 0.375rem; display: block; }
  .field-group { margin-bottom: 1.125rem; }

  select, input[type=number], input[type=range] {
    width: 100%; background: var(--bg); border: 1px solid var(--border2);
    color: var(--text); border-radius: 8px; padding: 0.625rem 0.875rem;
    font-family: var(--sans); font-size: 0.875rem;
    appearance: none; cursor: pointer;
    transition: border-color 0.15s;
  }
  select:focus, input[type=number]:focus {
    outline: none; border-color: var(--amber);
  }

  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5rem 0; border-bottom: 1px solid var(--border);
  }
  .toggle-row:last-child { border-bottom: none; }
  .toggle-label { font-size: 0.875rem; color: var(--text); }
  .toggle-sub { font-size: 0.75rem; color: var(--muted); }

  .toggle {
    position: relative; width: 40px; height: 22px; flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; inset: 0;
    background: var(--border2); border-radius: 22px; transition: 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute;
    width: 16px; height: 16px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: var(--amber); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

  .topic-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem;
    max-height: 180px; overflow-y: auto; padding-right: 4px;
  }
  .topic-chip {
    padding: 0.375rem 0.5rem; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    font-size: 0.75rem; cursor: pointer; text-align: center;
    transition: all 0.15s; color: var(--muted);
    font-family: var(--mono);
  }
  .topic-chip.selected {
    background: rgba(245,158,11,0.1); border-color: var(--amber); color: var(--amber2);
  }

  .start-btn {
    width: 100%; padding: 1rem; margin-top: 1.5rem;
    background: linear-gradient(135deg, var(--amber), #ff8c00);
    color: #000; border: none; border-radius: 10px; cursor: pointer;
    font-size: 1rem; font-weight: 700; font-family: var(--sans);
    letter-spacing: 0.02em; transition: opacity 0.15s, transform 0.1s;
  }
  .start-btn:hover { opacity: 0.92; transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── Stats Row ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-top: 2rem;
  }
  @media (max-width: 640px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.125rem 1.25rem;
  }
  .stat-num {
    font-size: 2rem; font-weight: 700; font-family: var(--mono); color: var(--amber);
    line-height: 1;
  }
  .stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

  /* ── Quiz Screen ── */
  .quiz-layout {
    display: grid; grid-template-columns: 1fr 260px; gap: 1.5rem; align-items: start;
  }
  @media (max-width: 800px) {
    .quiz-layout { grid-template-columns: 1fr; }
    .quiz-sidebar { order: -1; }
  }

  .quiz-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .quiz-progress-text { font-family: var(--mono); font-size: 0.875rem; color: var(--muted); }
  .quiz-progress-text span { color: var(--amber); font-weight: 600; }

  .timer {
    font-family: var(--mono); font-size: 1.25rem; font-weight: 600;
    padding: 0.375rem 0.875rem; border-radius: 8px;
    background: var(--bg); border: 1px solid var(--border2);
    min-width: 90px; text-align: center;
    transition: color 0.3s, border-color 0.3s;
  }
  .timer.warning { color: var(--orange); border-color: var(--orange); }
  .timer.danger  { color: var(--red);    border-color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  .progress-bar-wrap {
    height: 4px; background: var(--border); border-radius: 2px; margin-top: 0.75rem;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--amber), #ff8c00);
    transition: width 0.3s ease;
  }

  /* Question card */
  .q-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.75rem;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .q-meta {
    display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.25rem;
  }
  .q-num {
    font-family: var(--mono); font-size: 0.75rem; color: var(--muted);
    background: var(--bg); border: 1px solid var(--border);
    padding: 0.2rem 0.6rem; border-radius: 5px;
  }
  .q-topic {
    font-size: 0.72rem; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--blue2);
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2);
    padding: 0.2rem 0.625rem; border-radius: 5px;
  }
  .q-multiple-badge {
    font-size: 0.72rem; color: var(--orange);
    background: rgba(249,115,22,0.1); border: 1px solid rgba(249,115,22,0.2);
    padding: 0.2rem 0.625rem; border-radius: 5px;
    font-family: var(--mono);
  }
  .q-flag-btn {
    margin-left: auto; background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; padding: 0.25rem 0.6rem;
    border-radius: 6px; font-size: 0.75rem; transition: all 0.15s;
    display: flex; align-items: center; gap: 0.35rem;
  }
  .q-flag-btn.flagged { border-color: var(--orange); color: var(--orange); background: rgba(249,115,22,0.08); }

  .q-text {
    font-size: 1rem; color: var(--text); line-height: 1.7;
    margin-bottom: 1.5rem; font-weight: 400;
  }

  .options-list { display: flex; flex-direction: column; gap: 0.625rem; }

  .option {
    display: flex; align-items: flex-start; gap: 0.875rem;
    padding: 0.875rem 1.125rem; border-radius: 10px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: all 0.15s; background: var(--bg);
  }
  .option:hover:not(.disabled) {
    border-color: var(--border2); background: var(--surface2);
  }
  .option.selected {
    border-color: var(--amber); background: rgba(245,158,11,0.06);
  }
  .option.correct {
    border-color: var(--green); background: rgba(16,185,129,0.08);
  }
  .option.incorrect {
    border-color: var(--red); background: rgba(239,68,68,0.08);
  }
  .option.missed {
    border-color: var(--blue); background: rgba(59,130,246,0.06);
  }

  .option-letter {
    width: 24px; height: 24px; flex-shrink: 0;
    border-radius: 6px; border: 1.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 0.75rem; font-weight: 600;
    color: var(--muted); transition: all 0.15s;
  }
  .option.selected   .option-letter { background: var(--amber);  border-color: var(--amber);  color: #000; }
  .option.correct    .option-letter { background: var(--green);  border-color: var(--green);  color: #fff; }
  .option.incorrect  .option-letter { background: var(--red);    border-color: var(--red);    color: #fff; }
  .option.missed     .option-letter { background: var(--blue);   border-color: var(--blue);   color: #fff; }

  .option-text { font-size: 0.9rem; color: var(--text); line-height: 1.55; }

  /* Navigation bar */
  .q-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 1.5rem; gap: 0.75rem;
  }
  .q-nav-btn {
    padding: 0.625rem 1.25rem; border-radius: 8px; font-size: 0.875rem;
    cursor: pointer; transition: all 0.15s; font-family: var(--sans);
    font-weight: 500;
  }
  .q-nav-btn.prev {
    background: none; border: 1px solid var(--border2); color: var(--muted);
  }
  .q-nav-btn.prev:hover { border-color: var(--text); color: var(--text); }
  .q-nav-btn.next {
    background: var(--amber); border: 1px solid var(--amber);
    color: #000; font-weight: 700;
  }
  .q-nav-btn.next:hover { opacity: 0.88; }
  .q-nav-btn.submit {
    background: var(--green); border: 1px solid var(--green); color: #fff; font-weight: 700;
  }
  .q-nav-btn.submit:hover { opacity: 0.88; }
  .q-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .explanation-box {
    margin-top: 1.25rem; padding: 1rem 1.25rem;
    background: var(--bg); border: 1px solid var(--border2);
    border-left: 3px solid var(--blue); border-radius: 0 8px 8px 0;
    font-size: 0.875rem; color: var(--muted); line-height: 1.6;
    animation: fadeIn 0.3s ease;
  }
  .explanation-box strong { color: var(--blue2); }

  /* ── Sidebar ── */
  .quiz-sidebar { display: flex; flex-direction: column; gap: 1rem; }

  .sidebar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.125rem;
  }
  .sidebar-title {
    font-size: 0.72rem; font-family: var(--mono); text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--amber); margin-bottom: 0.875rem;
  }

  .q-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px;
  }
  .q-dot {
    aspect-ratio: 1; border-radius: 5px; cursor: pointer;
    font-size: 0.65rem; font-family: var(--mono); font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg); border: 1px solid var(--border2); color: var(--muted);
    transition: all 0.12s;
  }
  .q-dot:hover { border-color: var(--amber); }
  .q-dot.answered   { background: rgba(245,158,11,0.15); border-color: var(--amber); color: var(--amber2); }
  .q-dot.flagged    { background: rgba(249,115,22,0.15); border-color: var(--orange); color: var(--orange); }
  .q-dot.current    { background: var(--amber); border-color: var(--amber); color: #000; }
  .q-dot.correct-r  { background: rgba(16,185,129,0.2); border-color: var(--green); color: var(--green); }
  .q-dot.incorrect-r{ background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

  /* ── Results Screen ── */
  .results-hero {
    text-align: center; padding: 2.5rem 1rem 2rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; margin-bottom: 2rem;
  }
  .results-score {
    font-size: 5rem; font-weight: 700; font-family: var(--mono); line-height: 1;
    margin-bottom: 0.25rem;
  }
  .results-score.pass { color: var(--green); }
  .results-score.fail { color: var(--red); }
  .results-verdict { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
  .results-sub { color: var(--muted); font-size: 0.9rem; }

  .results-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem;
  }
  @media (max-width: 640px) { .results-grid { grid-template-columns: repeat(2, 1fr); } }

  .r-stat {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem;
    text-align: center;
  }
  .r-stat-num { font-size: 1.75rem; font-weight: 700; font-family: var(--mono); }
  .r-stat-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }

  /* Topic breakdown */
  .topic-breakdown { margin-bottom: 2rem; }
  .topic-breakdown h3 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; }
  .topic-row {
    display: flex; align-items: center; gap: 0.875rem; margin-bottom: 0.625rem;
  }
  .topic-name { font-size: 0.8125rem; font-family: var(--mono); min-width: 120px; color: var(--muted); }
  .topic-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .topic-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
  .topic-pct { font-size: 0.8125rem; font-family: var(--mono); min-width: 40px; text-align: right; }

  /* Review questions */
  .review-list { display: flex; flex-direction: column; gap: 1rem; }
  .review-item {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 1.25rem; border-left: 3px solid var(--border2);
  }
  .review-item.correct  { border-left-color: var(--green); }
  .review-item.incorrect { border-left-color: var(--red); }

  .review-header {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.875rem;
  }
  .review-badge {
    padding: 0.2rem 0.625rem; border-radius: 5px; font-size: 0.72rem; font-family: var(--mono);
    font-weight: 600;
  }
  .review-badge.correct   { background: rgba(16,185,129,0.12); color: var(--green); }
  .review-badge.incorrect { background: rgba(239,68,68,0.1);   color: var(--red);   }

  .review-q-text { font-size: 0.9rem; color: var(--text); line-height: 1.6; margin-bottom: 1rem; }

  .review-option {
    padding: 0.5rem 0.875rem; border-radius: 7px; font-size: 0.85rem;
    margin-bottom: 0.375rem; display: flex; gap: 0.625rem; align-items: flex-start;
  }
  .review-option.user-correct { background: rgba(16,185,129,0.1); color: var(--green); }
  .review-option.user-wrong   { background: rgba(239,68,68,0.08); color: var(--red); text-decoration: line-through; }
  .review-option.correct-ans  { background: rgba(59,130,246,0.08); color: var(--blue2); }
  .review-option.neutral      { color: var(--muted); }

  .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-tab {
    padding: 0.375rem 0.875rem; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; font-size: 0.8125rem; transition: all 0.15s;
  }
  .filter-tab.active {
    background: rgba(245,158,11,0.1); border-color: var(--amber); color: var(--amber2);
  }

  /* Attempts history */
  .attempts-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .attempt-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: 1rem; cursor: pointer;
    transition: border-color 0.15s;
  }
  .attempt-row:hover { border-color: var(--border2); }
  .attempt-score-circle {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-weight: 700; font-size: 0.875rem;
    border: 2px solid;
  }
  .attempt-score-circle.pass { border-color: var(--green); color: var(--green); background: rgba(16,185,129,0.08); }
  .attempt-score-circle.fail { border-color: var(--red);   color: var(--red);   background: rgba(239,68,68,0.06); }

  /* Loading / Error */
  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 40vh; flex-direction: column; gap: 1rem; color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px; border: 2px solid var(--border2);
    border-top-color: var(--amber); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px; padding: 1.25rem; color: var(--red); text-align: center;
  }

  .btn {
    padding: 0.625rem 1.25rem; border-radius: 8px; cursor: pointer; transition: all 0.15s;
    font-family: var(--sans); font-size: 0.875rem; font-weight: 600;
  }
  .btn-amber { background: var(--amber); border: none; color: #000; }
  .btn-amber:hover { opacity: 0.88; }
  .btn-ghost { background: none; border: 1px solid var(--border2); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--text); color: var(--text); }

  .section-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1.25rem; }

  /* Confirm dialog overlay */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .dialog {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; padding: 2rem; max-width: 420px; width: 90%;
  }
  .dialog h3 { font-size: 1.125rem; margin-bottom: 0.75rem; }
  .dialog p  { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .dialog-btns { display: flex; gap: 0.75rem; justify-content: flex-end; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = 'http://localhost:3001/api';

// ── Utility: format seconds → MM:SS ──────────────────────────────────────────
function fmtTime(sec) {
  if (sec < 0) return '00:00';
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function pctColor(pct) {
  if (pct >= 72) return 'var(--green)';
  if (pct >= 50) return 'var(--orange)';
  return 'var(--red)';
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function fetchJSON(url, opts = {}) {
  const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]   = useState('home');   // home | quiz | results | history
  const [stats,  setStats]    = useState(null);
  const [quizData, setQuizData] = useState(null);   // { attemptId, questions, total, timeLimit }
  const [results, setResults]   = useState(null);

  useEffect(() => {
    fetchJSON(`${API}/questions/stats`)
      .then(setStats)
      .catch(() => {});
  }, []);

  function onQuizStart(data) { setQuizData(data); setScreen('quiz'); }
  function onQuizEnd(res)    { setResults(res);   setScreen('results'); }
  function goHome()          { setScreen('home'); setQuizData(null); }

  return (
    <div className="app">
      <Nav screen={screen} setScreen={setScreen} goHome={goHome} />
      <main className="main">
        {screen === 'home'    && <HomeScreen stats={stats} onStart={onQuizStart} />}
        {screen === 'quiz'    && quizData && <QuizScreen quizData={quizData} onEnd={onQuizEnd} onAbort={goHome} />}
        {screen === 'results' && results  && <ResultsScreen results={results} goHome={goHome} />}
        {screen === 'history' && <HistoryScreen setResults={r => { setResults(r); setScreen('results'); }} />}
      </main>
    </div>
  );
}

// ── Nav ───────────────────────────────────────────────────────────────────────
function Nav({ screen, setScreen, goHome }) {
  return (
    <nav className="nav">
      <div className="nav-logo" onClick={goHome} style={{ cursor: 'pointer' }}>
        <div className="nav-logo-icon">AWS</div>
        SAA-C03 Simulator
      </div>
      <div className="nav-links">
        <button className={`nav-btn ${screen === 'home' ? 'active' : ''}`} onClick={goHome}>Home</button>
        <button className={`nav-btn ${screen === 'history' ? 'active' : ''}`} onClick={() => setScreen('history')}>History</button>
      </div>
    </nav>
  );
}

// ── Home Screen ───────────────────────────────────────────────────────────────
function HomeScreen({ stats, onStart }) {
  const [topics, setTopics]     = useState([]);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');

  // Quiz settings
  const [count,      setCount]      = useState(65);
  const [topic,      setTopic]      = useState('all');
  const [shuffle,    setShuffle]    = useState(true);
  const [multiOnly,  setMultiOnly]  = useState(false);

  useEffect(() => {
    fetchJSON(`${API}/questions/topics`).then(setTopics).catch(() => {});
  }, []);

  async function handleStart() {
    setLoading(true); setError('');
    try {
      const data = await fetchJSON(`${API}/quiz/start`, {
        method: 'POST',
        body: JSON.stringify({ topic, count, shuffle, multipleOnly: multiOnly }),
      });
      onStart(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  const hasQuestions = stats && stats.total > 0;

  return (
    <>
      <div className="home-hero">
        <h1>AWS <span>Solutions Architect</span><br/>Exam Simulator</h1>
        <p>Practice with 1,000+ real exam questions. Full timed exam mode, instant scoring, and topic-by-topic analysis.</p>
      </div>

      {stats && (
        <div className="stats-row">
          <div className="stat-card"><div className="stat-num">{stats.total.toLocaleString()}</div><div className="stat-lbl">Total Questions</div></div>
          <div className="stat-card"><div className="stat-num">{stats.multiple}</div><div className="stat-lbl">Multi-Answer</div></div>
          <div className="stat-card"><div className="stat-num">{stats.topics?.length}</div><div className="stat-lbl">Topics</div></div>
          <div className="stat-card"><div className="stat-num">72%</div><div className="stat-lbl">Pass Mark</div></div>
        </div>
      )}

      {!hasQuestions && (
        <div className="error-box" style={{ marginTop: '2rem' }}>
          No questions loaded. Make sure the backend is running and you have run <code>npm run import</code>.
        </div>
      )}

      {hasQuestions && (
        <div className="setup-grid">
          {/* Left card: Question count + topic */}
          <div className="setup-card">
            <h3>Quiz Settings</h3>
            <div className="field-group">
              <label className="field-label">Number of Questions: {count}</label>
              <input type="range" min={10} max={200} step={5} value={count}
                onChange={e => setCount(+e.target.value)} />
            </div>
            <div className="field-group">
              <label className="field-label">Topic Filter</label>
              <select value={topic} onChange={e => setTopic(e.target.value)}>
                <option value="all">All Topics</option>
                {topics.map(t => (
                  <option key={t.topic} value={t.topic}>{t.topic} ({t.count})</option>
                ))}
              </select>
            </div>
          </div>

          {/* Right card: Toggles */}
          <div className="setup-card">
            <h3>Options</h3>
            <div className="toggle-row">
              <div>
                <div className="toggle-label">Shuffle Questions</div>
                <div className="toggle-sub">Randomize order each time</div>
              </div>
              <label className="toggle">
                <input type="checkbox" checked={shuffle} onChange={e => setShuffle(e.target.checked)} />
                <span className="toggle-slider"></span>
              </label>
            </div>
            <div className="toggle-row">
              <div>
                <div className="toggle-label">Multiple-Answer Only</div>
                <div className="toggle-sub">Questions with 2+ correct answers</div>
              </div>
              <label className="toggle">
                <input type="checkbox" checked={multiOnly} onChange={e => setMultiOnly(e.target.checked)} />
                <span className="toggle-slider"></span>
              </label>
            </div>
            <div className="toggle-row">
              <div>
                <div className="toggle-label">Timed Exam</div>
                <div className="toggle-sub">72 seconds per question</div>
              </div>
              <label className="toggle">
                <input type="checkbox" defaultChecked disabled />
                <span className="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
      )}

      {error && <div className="error-box" style={{ marginTop: '1rem' }}>{error}</div>}

      {hasQuestions && (
        <button className="start-btn" onClick={handleStart} disabled={loading}>
          {loading ? 'Loading Questions...' : `Start Exam (${count} Questions)`}
        </button>
      )}
    </>
  );
}

// ── Quiz Screen ───────────────────────────────────────────────────────────────
function QuizScreen({ quizData, onEnd, onAbort }) {
  const { attemptId, questions, total, timeLimit } = quizData;

  const [current,  setCurrent]  = useState(0);
  const [answers,  setAnswers]  = useState(() => {
    // answers[i] = { selected: [], flagged: false }
    return questions.map(() => ({ selected: [], flagged: false }));
  });
  const [timeLeft, setTimeLeft] = useState(timeLimit);
  const [submitting, setSubmitting] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const timerRef = useRef(null);

  // Timer
  useEffect(() => {
    timerRef.current = setInterval(() => {
      setTimeLeft(t => {
        if (t <= 1) { clearInterval(timerRef.current); handleSubmit(true); return 0; }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, []);

  const q = questions[current];

  function toggleOption(idx) {
    setAnswers(prev => {
      const copy = [...prev];
      const ans  = { ...copy[current], selected: [...copy[current].selected] };
      if (q.isMultiple) {
        if (ans.selected.includes(idx)) ans.selected = ans.selected.filter(x => x !== idx);
        else ans.selected = [...ans.selected, idx];
      } else {
        ans.selected = ans.selected[0] === idx ? [] : [idx];
      }
      copy[current] = ans;
      return copy;
    });
  }

  function toggleFlag() {
    setAnswers(prev => {
      const copy = [...prev];
      copy[current] = { ...copy[current], flagged: !copy[current].flagged };
      return copy;
    });
  }

  async function handleSubmit(autoSubmit = false) {
    clearInterval(timerRef.current);
    setSubmitting(true);
    try {
      const payload = answers.map((ans, i) => ({
        questionId: questions[i].id,
        selected:   ans.selected,
        flagged:    ans.flagged,
      }));
      const res = await fetchJSON(`${API}/quiz/submit`, {
        method: 'POST',
        body: JSON.stringify({
          attemptId,
          answers: payload,
          timeTaken: timeLimit - timeLeft,
        }),
      });
      onEnd(res);
    } catch (e) {
      alert('Submit failed: ' + e.message);
      setSubmitting(false);
    }
  }

  const answered = answers.filter(a => a.selected.length > 0).length;
  const flagged  = answers.filter(a => a.flagged).length;
  const progress = ((current + 1) / total) * 100;

  const timerClass = timeLeft < 300 ? 'danger' : timeLeft < 600 ? 'warning' : '';

  return (
    <>
      {showConfirm && (
        <div className="overlay">
          <div className="dialog">
            <h3>Submit Exam?</h3>
            <p>
              You have answered {answered} of {total} questions.
              {flagged > 0 && ` ${flagged} question${flagged > 1 ? 's are' : ' is'} flagged for review.`}
              {total - answered > 0 && ` ${total - answered} question${total - answered > 1 ? 's are' : ' is'} unanswered.`}
            </p>
            <div className="dialog-btns">
              <button className="btn btn-ghost" onClick={() => setShowConfirm(false)}>Cancel</button>
              <button className="btn btn-amber" onClick={() => handleSubmit(false)} disabled={submitting}>
                {submitting ? 'Submitting...' : 'Submit'}
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="quiz-layout">
        {/* Main column */}
        <div>
          {/* Header */}
          <div className="quiz-header">
            <div>
              <div className="quiz-progress-text">
                Question <span>{current + 1}</span> of <span>{total}</span>
                <span style={{ marginLeft: '1rem', color: 'var(--muted)' }}>
                  {answered} answered · {flagged} flagged
                </span>
              </div>
              <div className="progress-bar-wrap" style={{ width: '260px', marginTop: '0.5rem' }}>
                <div className="progress-bar-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>
            <div className={`timer ${timerClass}`}>{fmtTime(timeLeft)}</div>
          </div>

          {/* Question */}
          <div className="q-card" key={current}>
            <div className="q-meta">
              <span className="q-num">Q{questions[current].id}</span>
              <span className="q-topic">{q.topic}</span>
              {q.isMultiple && <span className="q-multiple-badge">Select {q.correctAnswers ? q.correctAnswers.length : 'multiple'}</span>}
              <button className={`q-flag-btn ${answers[current].flagged ? 'flagged' : ''}`} onClick={toggleFlag}>
                ⚑ {answers[current].flagged ? 'Flagged' : 'Flag'}
              </button>
            </div>
            <p className="q-text">{q.question}</p>
            <div className="options-list">
              {q.options.map((opt, idx) => {
                const sel = answers[current].selected.includes(idx);
                return (
                  <div
                    key={idx}
                    className={`option ${sel ? 'selected' : ''}`}
                    onClick={() => toggleOption(idx)}
                  >
                    <span className="option-letter">{String.fromCharCode(65 + idx)}</span>
                    <span className="option-text">{opt}</span>
                  </div>
                );
              })}
            </div>
            {q.isMultiple && (
              <p style={{ fontSize: '0.78rem', color: 'var(--muted)', marginTop: '0.875rem' }}>
                Select all correct answers. All must be chosen to receive credit.
              </p>
            )}
          </div>

          {/* Navigation */}
          <div className="q-nav">
            <button className="q-nav-btn prev" onClick={() => setCurrent(c => c - 1)} disabled={current === 0}>
              ← Previous
            </button>
            <button className="btn btn-ghost" onClick={() => setShowConfirm(true)} style={{ fontSize: '0.8125rem' }}>
              Submit Exam
            </button>
            {current < total - 1
              ? <button className="q-nav-btn next" onClick={() => setCurrent(c => c + 1)}>Next →</button>
              : <button className="q-nav-btn submit" onClick={() => setShowConfirm(true)}>Finish →</button>
            }
          </div>
        </div>

        {/* Sidebar */}
        <div className="quiz-sidebar">
          <div className="sidebar-card">
            <div className="sidebar-title">Question Navigator</div>
            <div className="q-grid">
              {questions.map((_, i) => {
                let cls = '';
                if (i === current) cls = 'current';
                else if (answers[i].flagged) cls = 'flagged';
                else if (answers[i].selected.length > 0) cls = 'answered';
                return (
                  <div key={i} className={`q-dot ${cls}`} onClick={() => setCurrent(i)}>
                    {i + 1}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="sidebar-card">
            <div className="sidebar-title">Legend</div>
            {[
              ['current', 'Current'],
              ['answered', 'Answered'],
              ['flagged', 'Flagged'],
              ['', 'Unanswered'],
            ].map(([cls, lbl]) => (
              <div key={lbl} style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.5rem' }}>
                <div className={`q-dot ${cls}`} style={{ width: 20, height: 20, fontSize: '0.6rem' }}></div>
                <span style={{ fontSize: '0.8rem', color: 'var(--muted)' }}>{lbl}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </>
  );
}

// ── Results Screen ────────────────────────────────────────────────────────────
function ResultsScreen({ results, goHome }) {
  const [filter, setFilter] = useState('all'); // all | correct | incorrect | flagged
  const { score, total, percentage, passed, timeTaken, topicBreakdown, results: qs } = results;

  const filtered = qs.filter(q => {
    if (filter === 'correct')   return q.isCorrect;
    if (filter === 'incorrect') return !q.isCorrect;
    if (filter === 'flagged')   return q.flagged;
    return true;
  });

  const topicEntries = Object.entries(topicBreakdown || {})
    .sort((a, b) => (a[1].correct / a[1].total) - (b[1].correct / b[1].total));

  return (
    <>
      {/* Hero */}
      <div className="results-hero">
        <div className={`results-score ${passed ? 'pass' : 'fail'}`}>{percentage}%</div>
        <div className="results-verdict">{passed ? 'PASSED' : 'FAILED'}</div>
        <div className="results-sub">
          {score} correct out of {total} · {fmtTime(timeTaken)} taken
          {passed
            ? ' · You meet the 72% AWS pass requirement'
            : ` · Need ${Math.ceil(total * 0.72) - score} more correct to pass`}
        </div>
      </div>

      {/* Stats row */}
      <div className="results-grid">
        <div className="r-stat">
          <div className="r-stat-num" style={{ color: 'var(--green)' }}>{score}</div>
          <div className="r-stat-lbl">Correct</div>
        </div>
        <div className="r-stat">
          <div className="r-stat-num" style={{ color: 'var(--red)' }}>{total - score}</div>
          <div className="r-stat-lbl">Incorrect</div>
        </div>
        <div className="r-stat">
          <div className="r-stat-num">{fmtTime(timeTaken)}</div>
          <div className="r-stat-lbl">Time Taken</div>
        </div>
        <div className="r-stat">
          <div className="r-stat-num" style={{ color: pctColor(percentage) }}>{percentage}%</div>
          <div className="r-stat-lbl">Score</div>
        </div>
      </div>

      {/* Topic breakdown */}
      {topicEntries.length > 0 && (
        <div className="topic-breakdown">
          <h3 className="section-title">Topic Performance</h3>
          {topicEntries.map(([topic, data]) => {
            const pct = Math.round((data.correct / data.total) * 100);
            return (
              <div key={topic} className="topic-row">
                <span className="topic-name">{topic}</span>
                <div className="topic-bar-wrap">
                  <div className="topic-bar-fill" style={{ width: `${pct}%`, background: pctColor(pct) }} />
                </div>
                <span className="topic-pct" style={{ color: pctColor(pct) }}>{pct}%</span>
                <span style={{ fontSize: '0.75rem', color: 'var(--muted)', minWidth: '60px', textAlign: 'right' }}>
                  {data.correct}/{data.total}
                </span>
              </div>
            );
          })}
        </div>
      )}

      {/* Filter tabs */}
      <div className="filter-tabs">
        {[
          ['all',       `All (${qs.length})`],
          ['incorrect', `Incorrect (${qs.filter(q => !q.isCorrect).length})`],
          ['correct',   `Correct (${qs.filter(q =>  q.isCorrect).length})`],
          ['flagged',   `Flagged (${qs.filter(q =>  q.flagged).length})`],
        ].map(([key, lbl]) => (
          <button key={key} className={`filter-tab ${filter === key ? 'active' : ''}`} onClick={() => setFilter(key)}>
            {lbl}
          </button>
        ))}
      </div>

      {/* Review list */}
      <div className="review-list">
        {filtered.map((q, i) => (
          <ReviewItem key={q.questionId} q={q} num={i + 1} />
        ))}
      </div>

      <div style={{ marginTop: '2rem', display: 'flex', gap: '1rem' }}>
        <button className="btn btn-amber" onClick={goHome}>Take Another Quiz</button>
      </div>
    </>
  );
}

function ReviewItem({ q, num }) {
  const [open, setOpen] = useState(false);

  return (
    <div className={`review-item ${q.isCorrect ? 'correct' : 'incorrect'}`}>
      <div className="review-header" onClick={() => setOpen(!open)} style={{ cursor: 'pointer' }}>
        <span className={`review-badge ${q.isCorrect ? 'correct' : 'incorrect'}`}>
          {q.isCorrect ? '✓ Correct' : '✗ Incorrect'}
        </span>
        {q.flagged && <span className="review-badge" style={{ color: 'var(--orange)', background: 'rgba(249,115,22,0.1)' }}>⚑ Flagged</span>}
        <span style={{ fontSize: '0.75rem', color: 'var(--muted)', fontFamily: 'var(--mono)' }}>Q{q.questionId}</span>
        <span style={{ fontSize: '0.75rem', color: 'var(--blue2)', marginLeft: '0.25rem' }}>{q.topic}</span>
        <span style={{ marginLeft: 'auto', fontSize: '0.8rem', color: 'var(--muted)' }}>{open ? '▲' : '▼'}</span>
      </div>

      <p className="review-q-text">{q.question}</p>

      {open && (
        <>
          <div style={{ display: 'flex', flexDirection: 'column', gap: '0.25rem', marginBottom: '0.875rem' }}>
            {q.options.map((opt, idx) => {
              const isCorrect = q.correctAnswers.includes(idx);
              const wasSelected = q.selected.includes(idx);
              let cls = 'neutral';
              if (wasSelected && isCorrect) cls = 'user-correct';
              else if (wasSelected && !isCorrect) cls = 'user-wrong';
              else if (!wasSelected && isCorrect) cls = 'correct-ans';
              return (
                <div key={idx} className={`review-option ${cls}`}>
                  <span style={{ fontFamily: 'var(--mono)', fontWeight: 600, flexShrink: 0 }}>
                    {String.fromCharCode(65 + idx)}.
                  </span>
                  <span>{opt}</span>
                  {isCorrect && !wasSelected && <span style={{ marginLeft: 'auto', fontSize: '0.72rem' }}>← correct</span>}
                </div>
              );
            })}
          </div>
          <div className="explanation-box">
            <strong>Explanation: </strong>{q.explanation}
          </div>
        </>
      )}
    </div>
  );
}

// ── History Screen ────────────────────────────────────────────────────────────
function HistoryScreen({ setResults }) {
  const [attempts, setAttempts] = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [weakAreas, setWeakAreas] = useState([]);

  useEffect(() => {
    Promise.all([
      fetchJSON(`${API}/quiz/attempts`),
      fetchJSON(`${API}/quiz/weak-areas`),
    ]).then(([att, weak]) => {
      setAttempts(att);
      setWeakAreas(weak.slice(0, 8));
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);

  async function loadAttempt(id) {
    const data = await fetchJSON(`${API}/quiz/attempts/${id}`);
    setResults(data);
  }

  if (loading) return <div className="loading"><div className="spinner" /></div>;

  return (
    <>
      <h2 className="section-title" style={{ marginBottom: '1.5rem' }}>Exam History</h2>

      {weakAreas.length > 0 && (
        <div style={{ marginBottom: '2rem' }}>
          <h3 className="section-title" style={{ fontSize: '1rem', color: 'var(--red)' }}>Weak Areas (Lowest Scores)</h3>
          {weakAreas.map(area => (
            <div key={area.topic} className="topic-row">
              <span className="topic-name">{area.topic}</span>
              <div className="topic-bar-wrap">
                <div className="topic-bar-fill" style={{ width: `${area.percentage}%`, background: pctColor(area.percentage) }} />
              </div>
              <span className="topic-pct" style={{ color: pctColor(area.percentage) }}>{area.percentage}%</span>
              <span style={{ fontSize: '0.75rem', color: 'var(--muted)', minWidth: '60px', textAlign: 'right' }}>
                {area.correct}/{area.total}
              </span>
            </div>
          ))}
        </div>
      )}

      {attempts.length === 0 ? (
        <div className="loading">No past attempts yet. Take a quiz to see your history.</div>
      ) : (
        <div className="attempts-list">
          {attempts.map(att => (
            <div key={att.id} className="attempt-row" onClick={() => loadAttempt(att.id)}>
              <div className={`attempt-score-circle ${att.passed ? 'pass' : 'fail'}`}>
                {att.percentage}%
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: '0.9rem' }}>
                  {att.score}/{att.total} correct · {att.settings?.topic === 'all' ? 'All Topics' : att.settings?.topic}
                </div>
                <div style={{ fontSize: '0.78rem', color: 'var(--muted)', marginTop: '0.2rem' }}>
                  {new Date(att.finishedAt).toLocaleString()} · {fmtTime(att.timeTaken)}
                </div>
              </div>
              <span style={{ fontSize: '0.8rem', color: att.passed ? 'var(--green)' : 'var(--red)', fontWeight: 600 }}>
                {att.passed ? 'PASS' : 'FAIL'}
              </span>
              <span style={{ color: 'var(--muted)', fontSize: '0.875rem' }}>View →</span>
            </div>
          ))}
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
